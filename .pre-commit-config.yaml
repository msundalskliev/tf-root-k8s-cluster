repos:
  - repo: local
    hooks:
      - id: terraform-fmt
        name: Terraform format
        entry: terraform fmt -check=true -diff=true
        language: system
        files: \.tf$
        pass_filenames: false

      - id: terraform-validate
        name: Terraform validate
        entry: terraform validate
        language: system
        files: \.tf$
        pass_filenames: false

  - repo: https://github.com/bridgecrewio/checkov.git
    rev: '3.2.254'
    hooks:
      - id: checkov
        name: Checkov security scan
        args: ['--framework', 'terraform', '--skip-check', 'CKV_DOCKER_2']