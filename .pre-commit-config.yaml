repos:
  - repo: local
    hooks:
      - id: terraform-fmt
        name: Terraform format
        entry: terraform fmt -check=true -diff=true
        language: system
        files: \.tf$
        pass_filenames: false

      - id: terraform-validate
        name: Terraform validate
        entry: terraform validate
        language: system
        files: \.tf$
        pass_filenames: false